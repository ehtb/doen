# Production compose — backend and web only.
# Postgres and Redis are external managed services; provide their URLs via environment
# variables (DATABASE_URL and REDIS_URL). See DEPLOYMENT.md and .env.example.
#
# Usage:
#   cp .env.example .env   # fill in values
#   docker compose -f docker-compose.prod.yml up -d
#
# The dev docker-compose.yml is unchanged and unaffected.

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - path: .env
        required: false
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    environment:
      DOEN_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:3000/api/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
