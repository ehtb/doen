# --- BD-17: heuristic source citation and superseded-heuristic rules -------------------

- description: "BD-17 — confident item with heuristic prior must cite the heuristic ID"
  prompts: [shaping-review]
  vars:
    input: |
      HIGH-RELEVANCE PRIORS (score ≥ 0.75) — any item that contradicts one of these MUST be classified as 'flagged'. For confident items, cite the source id:
        - [BD-10] (heuristic, score 0.91, id=heur_f7a3c219b0e4): When writing to Postgres, always use optimistic locking (version column) to prevent lost updates under concurrent writes.

      Items to classify:
        item_id=item_aaa001  section=constraints
          text: All spec writes must use the optimistic version lock — stale-version edits are rejected with a 409 before any mutation.
  assert:
    # Must be confident — the heuristic clearly supports it
    - type: javascript
      value: |
        try {
          const match = output.match(/\{[\s\S]*\}/);
          const j = match ? match[0] : output;
          const parsed = JSON.parse(j);
          const cls = parsed.classifications?.find(c => c.item_id === 'item_aaa001');
          return cls?.category === 'confident';
        } catch (e) { return false; }
    # Reason must cite the heuristic ID or 'BD-10'
    - type: javascript
      value: |
        try {
          const match = output.match(/\{[\s\S]*\}/);
          const j = match ? match[0] : output;
          const parsed = JSON.parse(j);
          const cls = parsed.classifications?.find(c => c.item_id === 'item_aaa001');
          const reason = cls?.reason ?? '';
          return reason.includes('heur_f7a3c219b0e4') || reason.includes('BD-10');
        } catch (e) { return false; }
    # Reason must still be ≤ 15 words
    - type: javascript
      value: |
        try {
          const match = output.match(/\{[\s\S]*\}/);
          const j = match ? match[0] : output;
          const parsed = JSON.parse(j);
          const cls = parsed.classifications?.find(c => c.item_id === 'item_aaa001');
          return (cls?.reason ?? '').trim().split(/\s+/).length <= 15;
        } catch (e) { return false; }

