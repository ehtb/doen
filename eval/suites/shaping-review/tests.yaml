    # Must be uncertain — this is a genuine product/intent call for the human, not the executor
    - type: javascript
      value: |
        try {
          const match = output.match(/\{[\s\S]*\}/);
          const j = match ? match[0] : output;
          const parsed = JSON.parse(j);
          const cls = parsed.classifications?.find(c => c.item_id === 'item_bbb002');
          return cls?.category === 'uncertain';
        } catch (e) { return false; }
    # Reason should be phrased as a question OR as a statement about the human deciding
    - type: javascript
      value: |
        try {
          const match = output.match(/\{[\s\S]*\}/);
          const j = match ? match[0] : output;
          const parsed = JSON.parse(j);
