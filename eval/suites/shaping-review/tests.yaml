- description: "Conflict with prior — cites initiative ID, not internal item IDs"
  prompts: [shaping-review]
  vars:
    input: |
      HIGH-RELEVANCE PRIORS (score ≥ 0.75) — any item that contradicts one of these MUST be classified as 'flagged':
        - [BD-12] (decision, score 0.88): report_memory_drift is the designated tool for detecting memory discrepancies; adding parallel drift detection pathways was explicitly rejected to avoid tool proliferation.

      Items to classify:
        item_id=item_aaa111  section=acceptance
          text: A dedicated /drift/detect endpoint runs nightly and reports discrepancies independently of report_memory_drift.
          verify: [behavior] Run the endpoint, confirm a drift report appears in the admin panel.

        item_id=item_bbb222  section=constraints
          text: All initiative state transitions are derived by _recompute_state(); executors never set state directly.
  assert:
    # item_aaa111 must be flagged due to BD-12 conflict
    - type: javascript
      value: |
        try {
          const match = output.match(/\{[\s\S]*\}/);
          const j = match ? match[0] : output;
          const parsed = JSON.parse(j);
          const cls = parsed.classifications?.find(c => c.item_id === 'item_aaa111');
          return cls?.category === 'flagged';
        } catch (e) { return false; }
    # Reason must cite "BD-12", not an internal item ID
    - type: javascript
      value: |
        try {
          const match = output.match(/\{[\s\S]*\}/);
          const j = match ? match[0] : output;
          const parsed = JSON.parse(j);
          const cls = parsed.classifications?.find(c => c.item_id === 'item_aaa111');
          const reason = cls?.reason ?? '';
          return reason.includes('BD-12') && !/item_[a-z0-9]{6,}/.test(reason);
        } catch (e) { return false; }
    # item_bbb222 should NOT be flagged — it's a clean constraint with no conflict
    - type: javascript
      value: |
        try {
          const match = output.match(/\{[\s\S]*\}/);
          const j = match ? match[0] : output;
          const parsed = JSON.parse(j);
          const cls = parsed.classifications?.find(c => c.item_id === 'item_bbb222');
          return cls?.category !== 'flagged';
        } catch (e) { return false; }

