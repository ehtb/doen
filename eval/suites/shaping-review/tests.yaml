- description: "BD-17 — mixed batch: heuristic-grounded confident + no-memory uncertain + superseded flagged"
  prompts: [shaping-review]
  vars:
    input: |
      HIGH-RELEVANCE PRIORS (score ≥ 0.75) — any item that contradicts one of these MUST be classified as 'flagged'. For confident items, cite the source id:
        - [BD-12] (heuristic, score 0.93, id=heur_9z8y7x6w5v4u): Always gate long-term memory writes behind explicit human confirmation — no automated agent write to durable memory without a human-approval step.

      SUPERSEDED HEURISTICS — any item that would have been grounded in one of these MUST be classified as 'flagged' with reason citing the supersession:
        - [BD-5] superseded_by=BD-12: Auto-write memory entries after each completed initiative with no human gate.

      Items to classify:
        item_id=item_ddd004  section=constraints
          text: Heuristic extraction during Learn must be human-confirmed before any heuristic is written to long-term memory.

        item_id=item_eee005  section=discretion
          text: The visual indicator used to distinguish heuristic memory entries from narrative memory entries in the UI — whether to use color, icon, label, or some combination.

        item_id=item_fff006  section=constraints
          text: After each initiative completes, automatically write its heuristics to memory without prompting the human.
  assert:
    # item_ddd004 must be confident (grounded in heur_9z8y7x6w5v4u)
    - type: javascript
      value: |
        try {
          const match = output.match(/\{[\s\S]*\}/);
          const j = match ? match[0] : output;
          const parsed = JSON.parse(j);
          const cls = parsed.classifications?.find(c => c.item_id === 'item_ddd004');
          return cls?.category === 'confident';
        } catch (e) { return false; }
    # item_ddd004 reason must cite heur_9z8y7x6w5v4u or BD-12
    - type: javascript
      value: |
        try {
          const match = output.match(/\{[\s\S]*\}/);
          const j = match ? match[0] : output;
          const parsed = JSON.parse(j);
          const cls = parsed.classifications?.find(c => c.item_id === 'item_ddd004');
          const reason = cls?.reason ?? '';
          return reason.includes('heur_9z8y7x6w5v4u') || reason.includes('BD-12');
        } catch (e) { return false; }
    # item_eee005 must be uncertain (no memory, genuine choice)
    - type: javascript
      value: |
        try {
          const match = output.match(/\{[\s\S]*\}/);
          const j = match ? match[0] : output;
          const parsed = JSON.parse(j);
          const cls = parsed.classifications?.find(c => c.item_id === 'item_eee005');
          return cls?.category === 'uncertain';
        } catch (e) { return false; }
    # item_fff006 must be flagged (contradicts superseded heuristic that required human gate)
    - type: javascript
      value: |
        try {
          const match = output.match(/\{[\s\S]*\}/);
          const j = match ? match[0] : output;
          const parsed = JSON.parse(j);
          const cls = parsed.classifications?.find(c => c.item_id === 'item_fff006');
          return cls?.category === 'flagged';
        } catch (e) { return false; }
    # No item_XXXX IDs in any reason
    - type: javascript
      value: |
        try {
          const match = output.match(/\{[\s\S]*\}/);
          const j = match ? match[0] : output;
          const parsed = JSON.parse(j);
          for (const cls of parsed.classifications ?? []) {
            if (/item_[a-z0-9]{6,}/.test(cls.reason ?? '')) return false;
          }
          return true;
        } catch (e) { return false; }
