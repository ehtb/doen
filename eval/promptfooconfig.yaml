# Master Promptfoo Configuration
#
# This file consolidates all evaluation suites for the Doen project.
# Separation is maintained by organizing prompts and tests into suites/.
#
# Usage:
#   LLM_API_KEY=<your-key> npx promptfoo eval --config eval/promptfooconfig.yaml

description: "Doen LLM Evaluation Harness"

prompts:
  - id: verification-synthesis
    label: verification-synthesis
    raw: "file://suites/verification-synthesis/prompt.json"
  - id: shaping-review
    label: shaping-review
    raw: "file://suites/shaping-review/prompt.json"
  - id: shaping
    label: shaping
    raw: "file://suites/shaping/prompt.json"
  - id: shaping-research
    label: shaping-research
    raw: "file://suites/shaping-research/prompt.json"
  - id: learn-draft
    label: learn-draft
    raw: "file://suites/learn-draft/prompt.json"
  - id: heuristic-draft
    label: heuristic-draft
    raw: "file://suites/heuristic-draft/prompt.json"

providers:
  - id: openai:chat:anthropic/claude-sonnet-4.6
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      apiKeyEnvar: LLM_API_KEY
      max_tokens: 1024

tests:
  - suites/verification-synthesis/tests.yaml
  - suites/shaping-review/tests.yaml
  - suites/shaping/tests.yaml
  - suites/shaping-research/tests.yaml
  - suites/learn-draft/tests.yaml
  - suites/heuristic-draft/tests.yaml
