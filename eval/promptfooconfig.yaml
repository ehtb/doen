# Master Promptfoo Configuration
#
# This file consolidates all evaluation suites for the Doen project.
# Separation is maintained by organizing prompts and tests into suites/.
#
# Usage:
#   LLM_API_KEY=<your-key> npx promptfoo eval --config eval/promptfooconfig.yaml

description: "Doen LLM Evaluation Harness"

prompts:
  - id: verification-synthesis
    label: verification-synthesis
    raw: "file://suites/verification-synthesis/prompt.yaml"
  - id: shaping-review
    label: shaping-review
    raw: "file://suites/shaping-review/prompt.yaml"

providers:
  - id: openai:chat:anthropic/claude-sonnet-4.6
    config:
      apiBaseUrl: https://openrouter.ai/api/v1
      apiKeyEnvar: LLM_API_KEY
      max_tokens: 1024

tests:
  - suites/verification-synthesis/tests.yaml
  - suites/shaping-review/tests.yaml
