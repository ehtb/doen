services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: doen
      POSTGRES_PASSWORD: doen
      POSTGRES_DB: doen
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doen -d doen"]
      interval: 2s
      timeout: 3s
      retries: 15

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    # Your API key (and any model overrides) come from backend/.env; the connection
    # URLs below point at the in-network services and override whatever the file has,
    # so the same .env works for `make dev` (localhost) and compose (service names).
    env_file:
      - path: backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql://doen:doen@postgres:5432/doen
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    environment:
      DOEN_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
